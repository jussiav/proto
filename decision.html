      var endFmt     = new Date(req.auction_ends_at * 1000).toLocaleDateString('fi-FI', { day: 'numeric', month: 'long', year: 'numeric' });

      // Stats row — mirrors <dl class="flex flex-row divide-x divide-slate-200 text-center">
      var html = '<dl class="flex flex-row divide-x divide-slate-200 text-center">';
      html += '<div class="flex-auto flex flex-col px-2 py-1"><dt class="order-1 text-xs text-slate-500">Tarjousta</dt><dd class="font-bold text-slate-800">' + offerCount + '</dd></div>';

      html += '<div class="flex-auto flex flex-col px-2 py-1"><dt class="order-1 text-xs text-slate-500">Pyyntihinta</dt><dd class="font-bold text-slate-800">' + askingFmt + '</dd></div>';
      html += '</dl>';

      // Chart — uses req.insights_data (pre-generated bid progression, mirrors offers.astro formula)
      // data = [0, ...insights_data], chart starts at 0 bottom-left and rises to highest bid
      var ascending = (req.insights_data && req.insights_data.length) ? req.insights_data : [];
      if (ascending.length) {
        var asking = req.asking_price || 12000;
        var highestBidVal = ascending[ascending.length - 1] || 0;
        var chartData = [0].concat(ascending);  // leading 0, then bids
        var n = chartData.length;
        var W = 600, CHART_H = 200, TOP_PAD = 35, BOT_PAD = 10, SIDE_PAD = 12;
        var TOTAL_H = TOP_PAD + CHART_H + BOT_PAD; // 245
        // Use max(asking, highest) + 5% headroom so the bid progression fills the chart vertically
        var yMax = Math.max(asking, highestBidVal) * 1.05;

        function yC(v) { return TOP_PAD + CHART_H - (v / yMax) * CHART_H; }
        function xC(i) { return n > 1 ? SIDE_PAD + (i / (n - 1)) * (W - 2 * SIDE_PAD) : W / 2; }

        var askY = Math.round(yC(asking));
        var pts = chartData.map(function(v, i) { return Math.round(xC(i)) + ',' + Math.round(yC(v)); });

        // Fill polygon: bid line + bottom baseline
        var botY = TOP_PAD + CHART_H;
        var fillPts = pts.join(' ') + ' ' + Math.round(xC(n-1)) + ',' + botY + ' ' + Math.round(xC(0)) + ',' + botY;

        // Labels — asking price at left, highest bid at right — both in boxes above the line
        var askLabelX = SIDE_PAD;
        var askLabelY = Math.max(askY - 6, TOP_PAD - 2); // clamp within SVG
        var highestBid = highestBidVal;
        var highY = Math.round(yC(highestBid));
        var highLabelX = W - SIDE_PAD;
        var highLabelY = Math.max(highY - 6, TOP_PAD - 2);
        var LW = 74, LH = 18, LR = 3;

        html += '<div class="my-3 py-3 border-y border-slate-200 overflow-visible">' +
          '<svg viewBox="0 0 ' + W + ' ' + TOTAL_H + '" class="w-full" style="height:auto;display:block">' +

            '<polygon points="' + fillPts + '" fill="#EEF6FA" opacity="0.8"/>' +
            // Asking price dashed line
            '<line x1="' + SIDE_PAD + '" y1="' + askY + '" x2="' + (W-SIDE_PAD) + '" y2="' + askY + '" stroke="#0B6DFF" stroke-dasharray="5,5" stroke-width="1.5"/>' +
            // Bid line — always render when we have at least one offer (n >= 2 means [0, bid])
            '<polyline points="' + pts.join(' ') + '" fill="none" stroke="#2890FF" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
            // Asking price label box — left-anchored
            '<rect x="' + askLabelX + '" y="' + (askLabelY - LH + 4) + '" width="' + LW + '" height="' + LH + '" rx="' + LR + '" fill="white" stroke="black" stroke-width="0.8"/>' +
            '<text x="' + (askLabelX + LW/2) + '" y="' + (askLabelY - 1) + '" text-anchor="middle" font-size="9" fill="black" font-family="system-ui,sans-serif">' + fmtCurrency(asking) + '</text>' +
            // Highest bid label box — right-anchored
            '<rect x="' + (highLabelX - LW) + '" y="' + (highLabelY - LH + 4) + '" width="' + LW + '" height="' + LH + '" rx="' + LR + '" fill="white" stroke="black" stroke-width="0.8"/>' +
            '<text x="' + (highLabelX - LW/2) + '" y="' + (highLabelY - 1) + '" text-anchor="middle" font-size="9" fill="black" font-family="system-ui,sans-serif">' + fmtCurrency(highestBid) + '</text>' +
          '</svg>' +
        '</div>';
      } else {
        html += '<div class="my-3 py-3 border-y border-slate-200 flex items-center justify-center text-slate-400 text-sm" style="height:245px">Ei dataa</div>';

      // Start/end dates
      html += '<div class="flex flex-row justify-between text-xs text-slate-500"><div>' + startFmt + '</div><div>' + endFmt + '</div></div>';

    var ICO_STAR_FILL  = '<svg width="32" height="32" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="m234.5 114.38-45.1 39.36 13.51 58.6a16 16 0 0 1-23.84 17.34l-51.11-31-51 31a16 16 0 0 1-23.84-17.34l13.49-58.54-45.11-39.42a16 16 0 0 1 9.21-28.06l59.46-5.15 23.21-55.36a15.95 15.95 0 0 1 29.44 0L166.81 81l59.44 5.14a16 16 0 0 1 9.25 28.24Z"/></svg>';
    var ICO_INFO_FILL  = '<svg width="20" height="20" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M128 24a104 104 0 1 0 104 104A104.11 104.11 0 0 0 128 24Zm0 48a12 12 0 1 1-12 12 12 12 0 0 1 12-12Zm8 112h-16a8 8 0 0 1 0-16h4v-40h-4a8 8 0 0 1 0-16h8a8 8 0 0 1 8 8v48h4a8 8 0 0 1 0 16Z"/></svg>';

    var REJECT_REASONS = [
      { value: 'I_AM_NOT_SURE_THIS_OFFER_IS_RIGHT',        label: 'Olen epävarma siitä, onko tarjous tarpeeksi hyvä.' },
      { value: 'I_DONT_WANT_TO_SELL_AT_THE_PRICE_OFFERED', label: 'En halua myydä tarjotulla hinnalla.' },
      { value: 'I_HAVE_A_BETTER_OFFER_FROM_ANOTHER_SOURCE',label: 'Sain paremman tarjouksen muualta.' },
      { value: 'I_HAVE_ALREADY_SOLD_MY_CAR',               label: 'Olen jo myynyt autoni.' },
      { value: 'I_CANT_SELL_THE_CAR_RIGHT_NOW',            label: 'En voi myydä autoani juuri nyt.' },
      { value: 'I_WAS_NOT_INTERESTED_IN_SELLING_MY_CAR',   label: 'En ollut myymässä autoani.' },
      { value: 'OTHER',                                    label: 'Muu syy' }

    function openModal(action, offerId) {
      MODAL.action = action;
      MODAL.offerId = offerId;
      renderModal();
      document.getElementById('offer-modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('offer-modal').classList.add('hidden');
      document.body.style.overflow = '';
      MODAL.action = null;
    }

    function renderModal() {
      var action  = MODAL.action;
      var offerId = MODAL.offerId;
      var data    = getData();
      var offer   = (data.offers || []).find(function(o) { return o.id === offerId; }) || (data.offers || [])[0];
      var neg     = NEGOTIATIONS[offerId] || { messages: [], isStopped: false };
      var body    = document.getElementById('modal-body');
      var footer  = document.getElementById('modal-footer');
      var fWrap   = document.getElementById('modal-footer-wrap');
      fWrap.style.display = '';
      if (action === 'Accept')             { renderAcceptModal(body, footer, offer); }
      else if (action === 'Negotiate')     { renderNegotiateModal(body, footer, fWrap, offer, neg, false); }
      else if (action === 'QuickNegotiate'){ renderNegotiateModal(body, footer, fWrap, offer, neg, true); }
      else if (action === 'Reject')        { renderRejectModal(body, footer, offer, neg); }
      else if (action === 'RejectConfirm') { renderRejectConfirmModal(body, footer, offer); }
      else if (action === 'RejectConfirmThanks') { renderRejectThanksModal(body, fWrap); }
    }

    function renderAcceptModal(body, footer, offer) {
      body.innerHTML = '<p class="text-base text-slate-700">Mahtavaa, olet nyt hyväksymässä autoliikkeen tarjouksen!</p>';
      footer.innerHTML =
        '<div class="flex justify-end">' +
          '<button id="modal-btn-accept" class="inline-flex items-center justify-center px-8 h-10 rounded-lg bg-green-600 hover:bg-green-700 text-white text-sm font-medium shadow-[inset_0px_1px_2px_1px_rgba(255,255,255,0.20)]">Hyväksy tarjous</button>' +
        '</div>';
      document.getElementById('modal-btn-accept').addEventListener('click', function() {
        ACCEPTED_OFFER = offer;
        var _snap = getData().offers || [];
        ACCEPTED_OFFERS_SNAPSHOT = _snap.map(function(o) {
          return Object.assign({}, o, { status: o.id === offer.id ? 1 : 2, negotiation_pending: false, dealer_replied: false });
        });
        SCENARIO = 'accepted'; saveState(); closeModal();
        window.location.href = 'decision.html?scenario=accepted';
      });
    }

    function renderNegotiateModal(body, footer, fWrap, offer, neg, isQuick) {
      var data        = getData();
      var offersCount = (data.offers || []).length;
      var msgs        = (neg && neg.messages) || [];
      var sellerRounds = msgs.filter(function(m) { return m.sender === 'seller'; }).length;
      var lastMsg     = msgs[msgs.length - 1];
      var isStopped   = !!(neg && neg.isStopped);
      var sellerCanSend = sellerRounds < 2 && (!lastMsg || lastMsg.sender !== 'seller') && !isStopped;
      var hasNegotiation = msgs.length > 0;

      var html = '';

      if (isStopped) {
        // Negotiation stopped — seller accepts or closes
        html += '<h2 class="text-sm leading-4 mb-3">Voit hyväksyä tarjouksen</h2>';
        html += buildChatThread(msgs);

      } else if (sellerCanSend) {
        // Seller's turn to send
        if (isQuick) {
          html += '<div class="text-lg leading-4">';
          html += '<h2 class="text-lg leading-4">Tee vielä vastatarjous autoliikkeelle</h2>';
          html += '<p class="mt-2">' + (offersCount === 1
            ? 'Autostasi ei valitettavasti syntynyt tarjouskilpailua. Nyt sinun kannattaa kertoa autoliikkeelle summa, jolla olisit valmis myymään autosi.'
            : 'Korkein tarjoaja haluaa ostaa autosi, älä jätä peliä vielä kesken. Nyt sinun kannattaa kertoa autoliikkeelle summa, jolla olisit valmis myymään autosi.') + '</p>';
          html += '</div>';
        } else {
          html += '<h2 class="text-lg leading-4">' + (hasNegotiation ? 'Tee uusi vastatarjous' : 'Tee vastatarjous') + '</h2>';
          html += '<ul class="list-disc list-inside mt-2 mb-4 text-sm">';
          html += '<li>' + (hasNegotiation ? 'Tee uusi vastatarjous eniten tarjonneelle' : 'Tee vastatarjous eniten tarjonneelle') + '</li>';
          html += '<li>Et menetä jo saamaasi tarjousta.</li>';
          html += '<li>Vastatarjouksen avulla päästään usein kauppoihin.</li>';
          html += '</ul>';
        }
        if (hasNegotiation) {
          html += buildChatThread(msgs);
          html += '<p class="mt-4 mb-4 p-4 flex items-center gap-2 text-white bg-blue-600 rounded-lg">';
          html += '<span class="mr-2 flex items-center text-white flex-shrink-0">' + ICO_INFO_FILL + '</span>';
          html += '<span class="text-base leading-normal">Vastatarjouksia ei tämän jälkeen tehdä enempää.</span>';
          html += '</p>';
        }
        html += '<div class="my-4">';
        html += '<label class="block text-sm font-medium text-slate-700 mb-1">Vastatarjous <span class="font-normal text-slate-500">€</span></label>';
        html += '<input type="number" id="modal-neg-amount" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500" />';
        html += '</div>';
        if (!isQuick) {
          html += '<div class="my-4">';
          html += '<label class="block text-sm font-medium text-slate-700 mb-1">Viesti</label>';
          html += '<textarea id="modal-neg-message" rows="3" maxlength="2500" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>';
          html += '</div>';
          html += '<p class="text-sm text-gray-700">Ethän kirjoita puhelinnumeroasi tai sähköpostiosoitettasi viestikenttään.</p>';
        }

      } else {
        // Waiting for dealer
        if (isQuick && sellerRounds === 1) {
          html += '<h2 class="text-lg leading-4">Eikö autoliike ole ollut yhteydessä?</h2>';
          html += '<ul class="list-disc list-inside mt-2 mb-4 text-sm">';
          html += '<li>Useimmiten saat vastauksen saman päivän aikana (arkisin kello 10–16 välillä).</li>';
          html += '<li>Jos sinulla on kysyttävää, ota meihin yhteyttä osoitteessa tiimi@autovex.fi</li>';
          html += '</ul>';
        } else if (sellerRounds === 1) {
          html += '<div class="mb-4">';
          html += '<h2 class="text-lg leading-4">Hyvä! Nyt odotellaan autoliikkeen vastausta.</h2>';
          html += '<ul class="list-disc list-inside mt-2 mb-4 text-sm">';
          html += '<li>Useimmiten saat sen saman päivän aikana (arkisin kello 10–16 välillä).</li>';
          html += '<li>Jos sinulla on kysyttävää, ota meihin yhteyttä osoitteessa tiimi@autovex.fi</li>';
          html += '</ul>';
          html += '</div>';
        } else if (sellerRounds >= 2) {
          html += '<p class="text-sm text-slate-700">Nyt odotellaan taas autoliikkeen vastausta. Tämän jälkeen voit hyväksyä tai hylätä autoliikkeen tarjouksen, vastatarjouksia ei tehdä enempää. Toivottavasti pääsette kauppoihin!</p>';
        }
        html += buildChatThread(msgs);
      }

      body.innerHTML = html;

      // Footer
      var showAccept = hasNegotiation;
      var showSend   = sellerCanSend;
      var showClose  = !sellerCanSend || isStopped;

      var fRight = '';
      if (showAccept) {
        fRight += '<button id="modal-btn-accept-from-neg" class="inline-flex items-center justify-center px-8 h-10 rounded-lg bg-green-600 hover:bg-green-700 text-white text-sm font-medium shadow-[inset_0px_1px_2px_1px_rgba(255,255,255,0.20)]">Hyväksy tarjous</button>';
      }
      if (showSend) {
        fRight += '<button id="modal-btn-send-neg" class="inline-flex items-center justify-center px-8 h-10 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium shadow-[inset_0px_1px_2px_1px_rgba(255,255,255,0.20)]">Lähetä</button>';
      }
      if (showClose) {
        fRight += '<button id="modal-btn-close" class="inline-flex items-center justify-center px-6 h-10 rounded-lg bg-transparent text-slate-600 hover:bg-slate-100 text-sm font-medium">Sulje</button>';
      }

      footer.innerHTML = '<div class="flex justify-end items-center gap-1">' + fRight + '</div>';

      var closeBtn       = document.getElementById('modal-btn-close');
      var acceptFromNeg  = document.getElementById('modal-btn-accept-from-neg');
      var sendBtn        = document.getElementById('modal-btn-send-neg');

      if (closeBtn)      closeBtn.addEventListener('click', closeModal);
      if (acceptFromNeg) acceptFromNeg.addEventListener('click', function() { openModal('Accept', MODAL.offerId); });
      if (sendBtn) sendBtn.addEventListener('click', function() {
        var amountEl  = document.getElementById('modal-neg-amount');
        var messageEl = document.getElementById('modal-neg-message');
        var amount = amountEl ? parseFloat(amountEl.value) || null : null;
        if (!amount) { if (amountEl) amountEl.focus(); return; }
        var message = messageEl ? (messageEl.value || '')
          : (offersCount === 1
              ? 'Hei! Autostani ei syntynyt hintakilpailua. Millä hinnalla olette valmiita kauppoihin?'
              : 'Moi! Tällä hinnalla olisin valmis myymään autoni.');
        var cur = NEGOTIATIONS[MODAL.offerId] || { messages: [], isStopped: false };
        cur.messages = cur.messages || [];
        cur.messages.push({ sender: 'seller', amount: amount, message: message, created_at: new Date().toISOString() });
        NEGOTIATIONS[MODAL.offerId] = cur;
        SCENARIO = 'counter-offer-sent'; saveState();
        renderPage();
        openModal('Negotiate', MODAL.offerId);
      });
    }

    function renderRejectModal(body, footer, offer, neg) {
      var data       = getData();
      var highest    = (data.offers || [])[0];
      var isHighest  = offer && highest && offer.id === highest.id;
      var hasNeg     = neg && neg.messages && neg.messages.length > 0;
      var isFinal    = offer && offer.status === 3;
      var showNeg    = !hasNeg && isHighest && !isFinal;

      body.innerHTML =
        '<p class="text-sm text-slate-700">' +
          (hasNeg
            ? 'Oletko varma että haluat hylätä tarjouksen?'
            : 'Oletko varma että haluat hylätä tarjouksen? Suosittelemme tekemään vastatarjouksen autoliikkeelle jos haluat autollesi noudon, paremman hinnan tai muuta lisätietoa. Asiakaspalvelumme auttaa myös mielellään tarvittaessa.') +
        '</p>';

      var fHtml = '<div class="flex justify-between items-center">';
      if (showNeg) {
        fHtml += '<button id="modal-btn-to-neg" class="inline-flex items-center justify-center px-8 h-10 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium shadow-[inset_0px_1px_2px_1px_rgba(255,255,255,0.20)]">Tee vastatarjous</button>';
      } else {
        fHtml += '<span></span>';
      }
      fHtml += '<button id="modal-btn-reject-confirm" class="inline-flex items-center justify-center px-6 h-10 rounded-lg text-red-600 hover:bg-red-50 text-sm font-medium">Hylkää tarjous</button>';
      fHtml += '</div>';
      footer.innerHTML = fHtml;

      if (showNeg) {
        document.getElementById('modal-btn-to-neg').addEventListener('click', function() {
          MODAL.action = 'Negotiate';
          renderModal();
        });
      }
      document.getElementById('modal-btn-reject-confirm').addEventListener('click', function() {
        MODAL.action = 'RejectConfirm';
        renderModal();
      });
    }

    function renderRejectConfirmModal(body, footer, offer) {
      rejectFormState = { reason: null, starRating: 0 };
      var starColors = ['text-red-500', 'text-red-400', 'text-yellow-400', 'text-green-500', 'text-green-700'];

      var html = '';
      html += '<div class="font-bold text-xl mb-1">Olet hylkäämässä tarjouksen autostasi.</div>';
      html += '<div class="text-sm text-slate-600 mb-4">Ennen kuin vahvistat hylkäyksen, vastaisitko alla olevaan kysymykseen:</div>';
      html += '<div class="border-t border-gray-300 mb-5"></div>';
      html += '<div class="mb-6"><label class="block text-base font-medium text-black mb-3">Miksi haluat hylätä tämän tarjouksen? <span class="text-red-500">*</span></label><ol class="space-y-2">';
      REJECT_REASONS.forEach(function(opt, i) {
        html += '<li class="ml-2 text-slate-700"><input type="radio" id="rej-r-' + i + '" name="rej-reason" value="' + opt.value + '" class="mr-2 cursor-pointer"><label for="rej-r-' + i + '" class="cursor-pointer">' + opt.label + '</label></li>';
      });
      html += '</ol></div>';
      html += '<div id="rej-star-section" class="hidden mb-4">';
      html += '<label class="block text-base font-medium text-black mb-3">Mitä pidit palvelustamme? <span class="text-red-500">*</span></label>';
      html += '<div class="flex items-center justify-center bg-gray-100 border border-gray-300 p-4 rounded h-24"><div class="flex justify-between gap-4">';
      for (var s = 1; s <= 5; s++) {
        html += '<button type="button" data-star="' + s + '" class="star-btn ' + starColors[s-1] + ' opacity-30 hover:opacity-80 transition-opacity" style="width:32px;height:32px;">' + ICO_STAR_EMPTY + '</button>';
      }
      html += '</div></div></div>';
      body.innerHTML = html;

      body.querySelectorAll('input[name="rej-reason"]').forEach(function(radio) {
        radio.addEventListener('change', function() {
          rejectFormState.reason = this.value;
          document.getElementById('rej-star-section').classList.remove('hidden');
          updateRejectFooter(footer);
        });
      });
      body.querySelectorAll('.star-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var rating = parseInt(this.getAttribute('data-star'));
          rejectFormState.starRating = rating;
          body.querySelectorAll('.star-btn').forEach(function(b, idx) {
            var filled = (idx + 1) <= rating;
            b.innerHTML = filled ? ICO_STAR_FILL : ICO_STAR_EMPTY;
            b.className = 'star-btn ' + starColors[idx] + (filled ? ' opacity-100' : ' opacity-30 hover:opacity-80') + ' transition-opacity';
          });
          updateRejectFooter(footer);
        });
      });

      footer.innerHTML = '<div class="flex justify-end"><button id="modal-btn-do-reject" disabled class="inline-flex items-center justify-center px-8 h-10 rounded-lg bg-blue-600 text-white text-sm font-medium opacity-40 cursor-not-allowed">Hylkää tarjous</button></div>';
    }

    function updateRejectFooter(footer) {
      var enabled = !!(rejectFormState.reason && rejectFormState.starRating);
      footer.innerHTML =
        '<div class="flex justify-end"><button id="modal-btn-do-reject"' + (enabled ? '' : ' disabled') + ' class="inline-flex items-center justify-center px-8 h-10 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium shadow-[inset_0px_1px_2px_1px_rgba(255,255,255,0.20)]' + (enabled ? '' : ' opacity-40 cursor-not-allowed') + '">Hylkää tarjous</button></div>';
      if (enabled) {
        document.getElementById('modal-btn-do-reject').addEventListener('click', function() {
          SCENARIO = 'all-rejected'; saveState(); renderPage();
          MODAL.action = 'RejectConfirmThanks';
          renderModal();
        });
      }
    }

    function renderRejectThanksModal(body, fWrap) {
      fWrap.style.display = 'none';
      body.innerHTML =
        '<div class="rounded-lg overflow-hidden border-2 border-red-50 bg-white -mx-4 -mt-12 -mb-4">' +
          '<div class="bg-[rgb(250,234,218)] p-6 flex items-center justify-center">' +
            '<img src="assets/kasper.png" alt="" class="w-[50px] h-[50px] md:w-[76px] md:h-[76px] rounded-full object-cover border border-gray-200">' +
          '</div>' +
          '<div class="p-5">' +
            '<h2 class="font-bold text-lg md:text-xl mb-2">Kiitos kun käytit palveluamme!</h2>' +
            '<div class="text-sm text-slate-700">' +
              '<p>Saat asiantuntijamme kiinni sähköpostitse <a href="mailto:tiimi@autovex.fi" class="text-blue-600 underline">tiimi@autovex.fi</a> tai puhelimitse <a href="tel:+358449015285" class="text-blue-600">+358 44 901 5285</a>. Voimme vielä saada kaupat maaliin.</p>' +
              '<p class="text-slate-500 mt-1">Ark. klo 10–16</p>' +
            '</div>' +
            '<button id="modal-btn-thanks-close" class="mt-5 w-full inline-flex items-center justify-center px-6 h-10 rounded-lg border border-blue-600 text-blue-600 hover:bg-blue-50 text-sm font-medium">Sulje</button>' +
          '</div>' +
        '</div>';
      document.getElementById('modal-btn-thanks-close').addEventListener('click', function() {
        closeModal();
      });
    }

    // ── Event delegation for offer card & banner buttons ──
    document.addEventListener('click', function(e) {
      if (document.getElementById('offer-modal') && !document.getElementById('offer-modal').classList.contains('hidden')) return;
      var acceptBtn = e.target.closest('[data-action="accept-offer"]');
      var negBtn    = e.target.closest('[data-action="negotiate-offer"]');
      var rejectBtn = e.target.closest('[data-action="reject-all"]');
      if (acceptBtn) {
        openModal('Accept', parseInt(acceptBtn.getAttribute('data-offer-id')));
        return;
      }
      if (negBtn) {
        openModal('Negotiate', parseInt(negBtn.getAttribute('data-offer-id')));
        return;
      }
      if (rejectBtn) {
        var data     = getData();
        var highest  = (data.offers || [])[0];
        var highNeg  = highest && NEGOTIATIONS[highest.id];
        var hasNeg   = !!(highNeg && highNeg.messages && highNeg.messages.length > 0);
        var isFinal  = !!(highest && highest.status === 3);
        var req      = data.request;
        var negThres = !!(highest && req && highest.amount > req.asking_price * 0.75);
        openModal(!hasNeg && !isFinal && negThres ? 'QuickNegotiate' : 'Reject', highest ? highest.id : null);
        return;
      }
    });

    // ── Scenario tester panel ──

      { group: 'Auction ended', items: [
        { id: 'new-offers',            label: 'Ended, new offers' },
        { id: 'seen-offers',           label: 'Ended, offers seen' },
        { id: 'final-offer',           label: 'Final offer' },
        { id: 'no-offers',             label: 'No offers' },
        { id: 'offers-expired-unseen', label: 'Expired, unseen' },
        { id: 'counter-offer-sent',    label: 'Counter-offer sent' },
        { id: 'dealer-replied',        label: 'Dealer replied' },
        { id: 'all-rejected',          label: 'All rejected' },
      ]},
      { group: 'Deal completed', items: [
        { id: 'accepted',       label: 'Offer accepted' },
        { id: 'deal-completed', label: 'Deal completed' },
        { id: 'deal-failed',    label: 'Deal failed' },
      ]},
    ];
    var panel = document.createElement('div');
    panel.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:9999;font-family:system-ui,sans-serif;';
    var toggle = document.createElement('button');
    toggle.style.cssText = 'display:flex;align-items:center;gap:6px;padding:8px 12px;background:#0B6DFF;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25);';
    toggle.textContent = 'Scenario';
    var drawer = document.createElement('div');
    drawer.style.cssText = 'display:none;position:absolute;bottom:44px;right:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);width:260px;max-height:80vh;overflow-y:auto;padding:8px 0;';

    // Section: scenarios
    SCENARIO_GROUPS.forEach(function(grp, gi) {
      if (gi > 0) {
        var sep0 = document.createElement('div');
        sep0.style.cssText = 'height:1px;background:#e2e8f0;margin:4px 0;';
        drawer.appendChild(sep0);
      }
      var ghdr = document.createElement('div');
      ghdr.style.cssText = 'padding:6px 14px 2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;';
      ghdr.textContent = grp.group;
      drawer.appendChild(ghdr);
      grp.items.forEach(function(sc) {
        var a = document.createElement('a');
        var cur = sc.id === SCENARIO;
        var q = new URLSearchParams();
        q.set('scenario', sc.id);
        a.href = 'decision.html?' + q.toString();
        a.style.cssText = 'display:flex;align-items:center;padding:7px 14px;font-size:12px;text-decoration:none;color:' + (cur ? '#0B6DFF' : '#334155') + ';background:' + (cur ? '#EEF6FA' : 'transparent') + ';font-weight:' + (cur ? '700' : '400') + ';gap:6px;';
        a.innerHTML = (cur ? '<svg width="8" height="8" viewBox="0 0 8 8" fill="#0B6DFF"><circle cx="4" cy="4" r="4"/></svg>' : '<span style="width:8px;display:inline-block"></span>') + sc.label;
        a.addEventListener('mouseover', function() { if (!cur) this.style.background = '#f8fafc'; });
        a.addEventListener('mouseout',  function() { if (!cur) this.style.background = 'transparent'; });
        drawer.appendChild(a);
      });
    });

    // Separator
    var sep = document.createElement('div');
    sep.style.cssText = 'height:1px;background:#e2e8f0;margin:8px 0;';
    drawer.appendChild(sep);

    // Section: price inputs
    var priceHdr = document.createElement('div');
    priceHdr.style.cssText = 'padding:4px 14px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;';
    priceHdr.textContent = 'Price overrides';
    drawer.appendChild(priceHdr);

    function makeInput(labelText, paramKey, placeholder, defaultVal) {
      var wrap = document.createElement('div');
      wrap.style.cssText = 'padding:2px 14px 6px;';
      var lbl = document.createElement('label');
      lbl.style.cssText = 'display:block;font-size:10px;color:#64748b;margin-bottom:2px;';
      lbl.textContent = labelText;
      var inp = document.createElement('input');
      inp.type = 'number';
      inp.id = 'ov-' + paramKey;
      inp.placeholder = placeholder || '';
      inp.value = _params.has(paramKey) ? (_params.get(paramKey) || '') : (defaultVal !== undefined ? defaultVal : '');
      inp.style.cssText = 'width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px;font-size:12px;color:#334155;box-sizing:border-box;';
      wrap.appendChild(lbl);
      wrap.appendChild(inp);
      return wrap;
    }

    var curData = (SCENARIOS[SCENARIO] || SCENARIOS['new-offers'])();
    drawer.appendChild(makeInput('Asking price €', 'asking', '', OV_ASKING !== null && OV_ASKING !== undefined ? OV_ASKING : _funnelAskingPrice));
    drawer.appendChild(makeInput('Highest offer €', 'highest', '', OV_HIGHEST !== null && OV_HIGHEST !== undefined ? OV_HIGHEST : (curData.offers[0] ? curData.offers[0].amount : '')));
    drawer.appendChild(makeInput('2nd highest € (empty = 1 offer)', 'second', 'Empty = single offer',
      OV_SECOND === null ? '' : (OV_SECOND !== undefined ? OV_SECOND : (curData.offers[1] ? curData.offers[1].amount : ''))));

    var applyBtn = document.createElement('button');
    applyBtn.textContent = 'Apply';
    applyBtn.style.cssText = 'display:block;margin:6px 14px 10px;width:calc(100% - 28px);background:#0B6DFF;color:#fff;border:none;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;';
    applyBtn.addEventListener('click', function() {
      var q = new URLSearchParams(window.location.search);
      var askVal     = document.getElementById('ov-asking').value.trim();
      var highestVal = document.getElementById('ov-highest').value.trim();
      var secondVal  = document.getElementById('ov-second').value.trim();
      if (askVal)     q.set('asking', askVal);   else q.delete('asking');
      if (highestVal) q.set('highest', highestVal); else q.delete('highest');
      // Always set 'second' param so we can distinguish "empty = single offer"
      q.set('second', secondVal); // empty string → single offer
      window.location.href = 'decision.html?' + q.toString();
    });
    drawer.appendChild(applyBtn);

    // Section: negotiation simulator
    var negSepEl = document.createElement('div');
    negSepEl.style.cssText = 'height:1px;background:#e2e8f0;margin:8px 0;';
    drawer.appendChild(negSepEl);
    var negHdrEl = document.createElement('div');
    negHdrEl.style.cssText = 'padding:8px 14px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;';
    negHdrEl.textContent = 'Negotiation';
    drawer.appendChild(negHdrEl);
    var simBtn = document.createElement('button');
    simBtn.textContent = 'Simulate dealer reply';
    simBtn.style.cssText = 'display:block;margin:4px 14px 10px;width:calc(100% - 28px);background:#6366f1;color:#fff;border:none;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;';
    simBtn.addEventListener('click', function() {
      var _d = getData();
      var _h = (_d.offers || [])[0];
      if (!_h) return;
      var _neg  = NEGOTIATIONS[_h.id] || { messages: [], isStopped: false };
      var _msgs = _neg.messages || [];
      var _lastSellerMsg = _msgs.filter(function(m) { return m.sender === 'seller'; }).slice(-1)[0];
      if (!_lastSellerMsg) { alert('Send a counter-offer first'); return; }
      var _dealerAmount = Math.round(_lastSellerMsg.amount * 0.97);
      _neg.messages.push({
        sender: 'dealer',
        amount: _dealerAmount,
        message: 'Hei! Tämä on paras tarjous, jonka voimme tällä hetkellä antaa. Toivottavasti pääsemme kauppoihin!',
        created_at: new Date().toISOString()
      });
      NEGOTIATIONS[_h.id] = _neg;
      SCENARIO = 'dealer-replied'; saveState();
      open = false; drawer.style.display = 'none';
      renderPage();
      openModal('Negotiate', _h.id);
    });
    drawer.appendChild(simBtn);

    var open = false;
    toggle.addEventListener('click', function() { open = !open; drawer.style.display = open ? 'block' : 'none'; });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && open) { open = false; drawer.style.display = 'none'; } });
    document.addEventListener('click', function(e) { if (open && !panel.contains(e.target)) { open = false; drawer.style.display = 'none'; } });
    panel.appendChild(drawer);
    panel.appendChild(toggle);
    document.body.appendChild(panel);

    // Create modal element (must exist before wiring)
    var modalEl = document.createElement('div');
    modalEl.id = 'offer-modal';
    modalEl.className = 'hidden fixed inset-0 z-50 overflow-y-auto';
    modalEl.style.background = 'rgba(30,41,59,0.5)';
    modalEl.innerHTML =
      '<div class="min-h-full px-4 py-8 flex items-start justify-center">' +
        '<div id="offer-modal-panel" class="relative bg-white rounded-lg w-full max-w-2xl">' +
          '<button id="modal-close-btn" class="absolute top-0 right-0 p-4 h-12 w-12 flex items-center justify-center text-2xl leading-none text-black hover:text-slate-600 z-10" aria-label="Sulje">&times;</button>' +
          '<div id="modal-body" class="p-4 lg:p-6 pt-12"></div>' +
          '<div id="modal-footer-wrap"><div id="modal-footer" class="p-4 border-t border-gray-300"></div></div>' +
        '</div>' +
      '</div>';
    document.body.appendChild(modalEl);

    // Pre-populate negotiation state for counter-offer-sent scenario
    if (SCENARIO === 'counter-offer-sent') {
      var _coData = getData();
      (_coData.offers || []).forEach(function(o) {
        if (o.negotiation_pending && !NEGOTIATIONS[o.id]) {
          NEGOTIATIONS[o.id] = {
            messages: [
              { sender: 'seller', amount: 11700, message: 'Hei! Haluaisin tästä hieman enemmän. Minkä verran joustoa teillä on?', created_at: new Date((_now()-2*3600)*1000).toISOString() }
            ],
            isStopped: false
          };
        }
      });
    }

    // Pre-populate negotiation state for dealer-replied scenario
    if (SCENARIO === 'dealer-replied') {
      var _drData = getData();
      (_drData.offers || []).forEach(function(o) {
        if (o.dealer_replied && !NEGOTIATIONS[o.id]) {
          NEGOTIATIONS[o.id] = {
            messages: [
              { sender: 'seller', amount: 11700, message: 'Hei! Haluaisin tästä hieman enemmän. Minkä verran joustoa teillä on?', created_at: new Date((_now()-5*3600)*1000).toISOString() },
              { sender: 'dealer', amount: 11300, message: 'Hei! Tämä on paras tarjous, jonka voimme tällä hetkellä antaa. Toivottavasti pääsemme kauppoihin!', created_at: new Date((_now()-1*3600)*1000).toISOString() }
            ],
            isStopped: false
          };
        }
      });
    }

    // Pre-populate negotiation state for negotiation-stopped scenario
    if (SCENARIO === 'negotiation-stopped') {
      var _nsData = getData();
      (_nsData.offers || []).forEach(function(o) {
        if (o.negotiation_pending && !NEGOTIATIONS[o.id]) {
          NEGOTIATIONS[o.id] = {
            messages: [
              { sender: 'seller', amount: 11700, message: 'Hei! Haluaisin tästä hieman enemmän. Minkä verran joustoa teillä on?', created_at: new Date((_now()-5*3600)*1000).toISOString() },
              { sender: 'dealer', amount: 11300, message: 'Hei! Tämä on paras tarjous, jonka voimme tällä hetkellä antaa. Toivottavasti pääsemme kauppoihin!', created_at: new Date((_now()-3*3600)*1000).toISOString() },
              { sender: 'seller', amount: 11500, message: 'Okei, voisiko 11 500 € onnistua?', created_at: new Date((_now()-1*3600)*1000).toISOString() }
            ],
            isStopped: true
          };
        }
      });
    }

    // Wire modal close
    document.getElementById('modal-close-btn').addEventListener('click', closeModal);
    document.getElementById('offer-modal').addEventListener('click', function(e) {
      var panel = document.getElementById('offer-modal-panel');
      var path = e.composedPath ? e.composedPath() : [];
      var insidePanel = path.indexOf(panel) !== -1 || panel.contains(e.target);
      if (!insidePanel) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && !document.getElementById('offer-modal').classList.contains('hidden')) closeModal();
    });

    // Boot
    saveState();
    renderPage();
  })();
  </script>


</body>
